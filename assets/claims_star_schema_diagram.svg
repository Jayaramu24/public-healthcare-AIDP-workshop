<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MPHA Claims star schema diagram</title>
  <desc id="desc">A neat Claims star schema with a centered monthly claims fact table connected to date, district, coverage program, and claim type dimensions.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#143735" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f5f8f7; }
      .accent { fill: #c74634; }
      .title { font: 700 32px Arial, Helvetica, sans-serif; fill: #20312d; }
      .subtitle { font: 18px Arial, Helvetica, sans-serif; fill: #5e6d68; }
      .card { fill: #ffffff; stroke: #d7e2dd; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .fact-card { fill: #143735; stroke: #143735; stroke-width: 2; rx: 22; filter: url(#shadow); }
      .card-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #20312d; text-anchor: middle; }
      .card-sub { font: 14px Arial, Helvetica, sans-serif; fill: #5e6d68; text-anchor: middle; }
      .fact-title { font: 700 22px Arial, Helvetica, sans-serif; fill: #ffffff; text-anchor: middle; }
      .fact-sub { font: 14px Arial, Helvetica, sans-serif; fill: #dce7e2; text-anchor: middle; }
      .pill { fill: #eef4f2; stroke: #d7e2dd; stroke-width: 1; rx: 11; }
      .fact-pill { fill: #254946; stroke: #45645f; stroke-width: 1; rx: 11; }
      .pill-text { font: 13px Arial, Helvetica, sans-serif; fill: #455550; text-anchor: middle; dominant-baseline: middle; }
      .pill-text-light { font: 13px Arial, Helvetica, sans-serif; fill: #f3f8f6; text-anchor: middle; dominant-baseline: middle; }
      .connector { stroke: #71807c; stroke-width: 3; fill: none; stroke-linecap: round; }
      .connector-dot { fill: #71807c; }
      .caption { font: 17px Arial, Helvetica, sans-serif; fill: #5e6d68; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <rect class="accent" x="70" y="62" width="120" height="8" rx="4"/>
  <text class="title" x="70" y="116">Claims Star Schema in Autonomous AI Lakehouse</text>
  <text class="subtitle" x="70" y="148">One monthly claims fact table connects directly to conformed dimensions used by OAC dashboards and AI Assistant questions.</text>

  <path class="connector" d="M 402 296 C 456 318, 500 342, 535 366"/>
  <path class="connector" d="M 798 296 C 744 318, 700 342, 665 366"/>
  <path class="connector" d="M 402 578 C 456 548, 500 515, 535 474"/>
  <path class="connector" d="M 798 578 C 744 548, 700 515, 665 474"/>
  <circle class="connector-dot" cx="535" cy="366" r="5"/>
  <circle class="connector-dot" cx="665" cy="366" r="5"/>
  <circle class="connector-dot" cx="535" cy="474" r="5"/>
  <circle class="connector-dot" cx="665" cy="474" r="5"/>

  <g transform="translate(80 205)">
    <rect class="card" x="0" y="0" width="322" height="170"/>
    <text class="card-title" x="161" y="40">mpha_dim_date</text>
    <text class="card-sub" x="161" y="66">Calendar and month grain</text>
    <rect class="pill" x="46" y="88" width="230" height="30"/>
    <text class="pill-text" x="161" y="103">date_key</text>
    <rect class="pill" x="46" y="124" width="230" height="30"/>
    <text class="pill-text" x="161" y="139">full_date | month | year</text>
  </g>

  <g transform="translate(798 205)">
    <rect class="card" x="0" y="0" width="322" height="170"/>
    <text class="card-title" x="161" y="40">mpha_dim_district</text>
    <text class="card-sub" x="161" y="66">District and population context</text>
    <rect class="pill" x="46" y="88" width="230" height="30"/>
    <text class="pill-text" x="161" y="103">district_key</text>
    <rect class="pill" x="46" y="124" width="230" height="30"/>
    <text class="pill-text" x="161" y="139">district_name | region | risk</text>
  </g>

  <g transform="translate(420 300)">
    <rect class="fact-card" x="0" y="0" width="360" height="220"/>
    <text class="fact-title" x="180" y="46">mpha_fact_claims_monthly</text>
    <text class="fact-sub" x="180" y="74">Monthly claims performance grain</text>
    <rect class="fact-pill" x="35" y="98" width="290" height="30"/>
    <text class="pill-text-light" x="180" y="113">service_month_date_key</text>
    <rect class="fact-pill" x="35" y="134" width="290" height="30"/>
    <text class="pill-text-light" x="180" y="149">district_key | program_key | claim_type_key</text>
    <rect class="fact-pill" x="35" y="170" width="290" height="30"/>
    <text class="pill-text-light" x="180" y="185">claims | amounts | denial rate | days</text>
  </g>

  <g transform="translate(80 520)">
    <rect class="card" x="0" y="0" width="322" height="170"/>
    <text class="card-title" x="161" y="40">mpha_dim_coverage_program</text>
    <text class="card-sub" x="161" y="66">Coverage and public program lens</text>
    <rect class="pill" x="46" y="88" width="230" height="30"/>
    <text class="pill-text" x="161" y="103">program_key</text>
    <rect class="pill" x="46" y="124" width="230" height="30"/>
    <text class="pill-text" x="161" y="139">coverage_program | funding</text>
  </g>

  <g transform="translate(798 520)">
    <rect class="card" x="0" y="0" width="322" height="170"/>
    <text class="card-title" x="161" y="40">mpha_dim_claim_type</text>
    <text class="card-sub" x="161" y="66">Service and adjudication category</text>
    <rect class="pill" x="46" y="88" width="230" height="30"/>
    <text class="pill-text" x="161" y="103">claim_type_key</text>
    <rect class="pill" x="46" y="124" width="230" height="30"/>
    <text class="pill-text" x="161" y="139">claim_type | service | priority</text>
  </g>

  <text class="caption" x="600" y="724">OAC joins the central fact to each dimension directly, keeping the guided dashboard simple, explainable, and reusable.</text>
</svg>
